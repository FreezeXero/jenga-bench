<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JengaBench Live Inspector</title>
    <link rel="stylesheet" href="/static/styles.css?v=6">
  </head>
  <body>
    <main class="layout">
      <section class="panel">
        <div class="heading">
          <div>
            <p class="eyebrow">JengaBench</p>
            <h1>Live Tower Inspector</h1>
          </div>
          <div class="actions">
            <button id="capture" type="button">Capture PNG</button>
            <button id="reset" type="button">Reset camera</button>
          </div>
        </div>
        <div id="viewport" class="viewport" aria-label="Drag to orbit and scroll to zoom">
          <canvas id="frame" width="512" height="512" aria-label="Local live tower preview"></canvas>
          <div id="loading" class="loading">Capturing PNG</div>
        </div>
        <p class="hint">Drag to orbit. Scroll to zoom. Local preview controls are unscored.</p>
      </section>
      <aside class="metadata">
        <p class="eyebrow">Camera state</p>
        <dl>
          <div><dt>Azimuth</dt><dd><span id="azimuth">225.00</span>&deg;</dd></div>
          <div><dt>Pitch</dt><dd><span id="pitch">15.00</span>&deg;</dd></div>
          <div><dt>Distance</dt><dd><span id="distance">45.00</span> cm</dd></div>
        </dl>
        <p class="eyebrow">Push sandbox</p>
        <div class="sandbox-form">
          <label>Seed<input id="tower-seed" type="number" step="1" value="0"></label>
          <label>Layer<input id="push-layer" type="number" min="1" max="18" value="8"></label>
          <label>Color<select id="push-color"></select></label>
          <label>Face<select id="push-face"></select></label>
          <label>Contact<select id="push-contact"></select></label>
          <label>Strength<select id="push-intensity">
            <option>Gentle</option><option>Firm</option><option>Hard</option>
          </select></label>
          <button id="push" type="button">Push block</button>
          <button id="reset-tower" class="secondary" type="button">Reset tower</button>
          <p id="sandbox-error" class="error"></p>
        </div>
        <dl class="sandbox-state">
          <div><dt>Phase</dt><dd id="phase">idle</dd></div>
          <div><dt>Outcome</dt><dd id="outcome">-</dd></div>
          <div><dt>Sim time</dt><dd><span id="sim-time">0.00</span>s</dd></div>
          <div><dt>Frames</dt><dd id="frame-count">0</dd></div>
        </dl>
        <div class="status"><span id="status-dot"></span><span id="status">Connecting</span></div>
      </aside>
    </main>
    <script src="/static/app.js?v=7"></script>
  </body>
</html>
