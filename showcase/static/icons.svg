<svg xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Camera: tripod + trapezoid lens -->
    <symbol id="icon-camera" viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="17" y="20" width="26" height="20" rx="2" fill="currentColor" opacity="0.25"/>
      <polygon points="43,24 57,18 57,42 43,36" fill="currentColor" opacity="0.15"/>
      <line x1="30" y1="40" x2="18" y2="62"/>
      <line x1="30" y1="40" x2="30" y2="62"/>
      <line x1="30" y1="40" x2="42" y2="62"/>
    </symbol>

    <!-- Push: arrow + block -->
    <symbol id="icon-push" viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="15" y1="30" x2="60" y2="30"/>
      <polyline points="52,24 62,30 52,36"/>
      <rect x="15" y="42" width="50" height="10" rx="1.5" fill="currentColor" opacity="0.25"/>
    </symbol>

    <!-- Place Back: block + down arrow -->
    <symbol id="icon-place" viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="15" y="28" width="50" height="10" rx="1.5" fill="currentColor" opacity="0.25"/>
      <line x1="40" y1="44" x2="40" y2="62"/>
      <polyline points="34,56 40,64 46,56"/>
    </symbol>
  </defs>
</svg>
